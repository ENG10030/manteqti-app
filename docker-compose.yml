version: '3.8'

services:
  # التطبيق الرئيسي
  manteqti:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manteqti-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/production.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-secret-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-manteqti-secret-key-32-characters!!}
    volumes:
      - ./db:/app/db
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/apartments"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (اختياري للإنتاج)
  nginx:
    image: nginx:alpine
    container_name: manteqti-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - manteqti
    profiles:
      - production

  # Prometheus للمراقبة (اختياري)
  prometheus:
    image: prom/prometheus:latest
    container_name: manteqti-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring

networks:
  default:
    name: manteqti-network
